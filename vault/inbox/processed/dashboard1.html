<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>דשבורד ניהולי - ישיבת 11.01.2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 20px; color: #333; }
        .header { background: #2c3e50; color: white; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid #3498db; }
        .card h3 { margin: 0; font-size: 14px; color: #7f8c8d; }
        .card .value { font-size: 32px; font-weight: bold; margin: 10px 0; color: #2c3e50; }
        .card .target { font-size: 12px; color: #27ae60; }
        .charts-container { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .chart-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); height: 300px; }
        .warning { border-top: 5px solid #e74c3c; }
    </style>
</head>
<body>

<div class="header">
    <h1>דשבורד מדדי ביצוע (KPI) - הנהלה</h1>
    <p>יעד שנתי מרכזי: צמיחה והתייצבות מערכתית</p>
</div>

<div class="grid">
    <div class="card">
        <h3>פגישות שבוצעו (חודשי)</h3>
        <div class="value">82</div>
        <div class="target">יעד: 100 פגישות</div>
    </div>
    <div class="card">
        <h3>אחוז המרה (פניות->פגישות)</h3>
        <div class="value">92%</div>
        <div class="target">יעד: 95%</div>
    </div>
    <div class="card warning">
        <h3>זמן המתנה ממוצע</h3>
        <div class="value">14 ימים</div>
        <div class="target">מגמת עליה ⚠️</div>
    </div>
    <div class="card">
        <h3>זמינות תור קרוב</h3>
        <div class="value">3 ימים</div>
        <div class="target">סטטוס: תקין</div>
    </div>
</div>

<div class="charts-container">
    <div class="chart-box">
        <canvas id="mainChart"></canvas>
    </div>
    <div class="chart-box">
        <canvas id="pieChart"></canvas>
    </div>
</div>

<script>
    // גרף עמודות - פניות מול פגישות
    const ctx = document.getElementById('mainChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['שבוע 1', 'שבוע 2', 'שבוע 3', 'שבוע 4'],
            datasets: [{
                label: 'פניות (שאלונים)',
                data: [30, 28, 35, 32],
                backgroundColor: '#3498db'
            }, {
                label: 'פגישות שנקבעו',
                data: [25, 26, 30, 28],
                backgroundColor: '#2ecc71'
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });

    // גרף עוגה - אינטייק מול מעקב
    const ctx2 = document.getElementById('pieChart').getContext('2d');
    new Chart(ctx2, {
        type: 'doughnut',
        data: {
            labels: ['אינטייק (חדש)', 'מעקב'],
            datasets: [{
                data: [85, 15],
                backgroundColor: ['#e67e22', '#9b59b6']
            }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            plugins: { title: { display: true, text: 'יחס פגישות (יעד מעקב: 15%)' } }
        }
    });
</script>

</body>
</html>
